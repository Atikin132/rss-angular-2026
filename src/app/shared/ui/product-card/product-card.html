<article class="product-card">
  <img class="product-card__image" [src]="product().imageUrl" [alt]="product().name" />

  <div class="product-card__content">
    <h3 class="product-card__name">{{ product().name }}</h3>
    <p class="product-card__description">{{ product().description }}</p>

    <div class="product-card__price">
      @if (hasDiscount) {
        <span class="product-card__price-old">
          {{ product().price | currency: product().currencyCode }}
        </span>
        <span class="product-card__price-current">
          {{ product().discountedPrice | currency: product().currencyCode }}
        </span>
      } @else {
        <span class="product-card__price-current">
          {{ product().price | currency: product().currencyCode }}
        </span>
      }
    </div>

    <button class="product-card__button" type="button" [disabled]="product().isInCart">
      {{ product().isInCart ? 'In cart' : 'Add to cart' }}
    </button>
  </div>
</article>
