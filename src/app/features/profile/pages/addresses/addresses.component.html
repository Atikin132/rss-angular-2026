<section class="addresses-page">
  <article class="addresses-card">
    <header class="addresses-card__header">
      <div>
        <h1>Addresses</h1>
        <p>Manage shipping and billing addresses for your account.</p>
      </div>

      <button mat-flat-button type="button" (click)="editAddress()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>Add Address</span>
      </button>
    </header>

    <div class="address-list">
      <article class="address-item">
        <div class="address-item__icon" aria-hidden="true">
          <mat-icon>location_on</mat-icon>
        </div>

        <div class="address-item__content">
          <div class="address-item__title">
            <h2>Main Street 12</h2>
            <span>Default shipping</span>
            <span>Default billing</span>
          </div>

          <p>New York, 10001, US</p>
        </div>

        <div class="address-actions">
          <button mat-stroked-button type="button" (click)="editAddress()">Edit</button>
          <button mat-button type="button">Delete</button>
        </div>
      </article>
    </div>

    <form class="address-form">
      <mat-form-field appearance="outline">
        <mat-label>Street Address</mat-label>
        <input [disabled]="!isEditMode()" matInput type="text" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input [disabled]="!isEditMode()" matInput type="text" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Postal Code</mat-label>
        <input [disabled]="!isEditMode()" matInput type="text" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Country</mat-label>
        <input [disabled]="!isEditMode()" matInput type="text" />
      </mat-form-field>

      @if (isEditMode()) {
        <div class="edit-actions">
          <button mat-flat-button type="button" (click)="saveAddress()">
            <mat-icon aria-hidden="true">save</mat-icon>
            <span>Save Address</span>
          </button>

          <button mat-stroked-button type="button" (click)="cancelEdit()">
            <mat-icon aria-hidden="true">close</mat-icon>
            <span>Cancel</span>
          </button>
        </div>
      }
    </form>
  </article>
</section>
