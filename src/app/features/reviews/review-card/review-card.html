<mat-card class="card">
  <div class="header">
    <div class="user">
      {{ review().userName }}
    </div>

    <div class="date">
      {{ formatDate(review().createdAt) }}
    </div>
  </div>

  <div class="rating">
    @for (star of stars; track star) {
      <mat-icon class="star" [class.filled]="isFilled(star)">
        {{ isFilled(star) ? 'star' : 'star_border' }}
      </mat-icon>
    }
  </div>

  <div class="comment">
    {{ review().comment }}
  </div>
</mat-card>
