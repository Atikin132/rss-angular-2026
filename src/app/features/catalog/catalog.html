<div class="page-content">
  <app-filters
    [value]="filters()"
    [categories]="categories()"
    [brands]="brands()"
    (valueChange)="onFiltersChange($event)"
  />
  <div class="catalog-page">
    <div class="sort-search">
      <app-sort [value]="store.sortType()" (valueChange)="onSortChange($event)" />
      <app-search [value]="store.searchQuery()" (valueChange)="onSearchChange($event)" />
    </div>

    <app-product-grid [products]="products()" />

    <app-pagination
      [currentPage]="currentPage()"
      [total]="total()"
      [pageSize]="pageSize"
      [loading]="loading()"
      (pageChange)="onPageChange($event)"
    />
  </div>
</div>
