<div class="sort-container">
  <label for="sort-select">Sort by:</label>

  <div class="select-wrapper">
    <select class="sort-select" id="sort-select" [value]="value()" (change)="onChange($event)">
      @for (option of options; track option.value) {
        <option [value]="option.value">
          {{ option.label }}
        </option>
      }
    </select>

    <mat-icon class="select-icon">keyboard_double_arrow_down</mat-icon>
  </div>
</div>
