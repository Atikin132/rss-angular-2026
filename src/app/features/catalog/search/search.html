<div class="search-container">
  <div class="search-wrapper">
    <mat-icon class="search-icon">search</mat-icon>

    <input
      aria-label="Search products"
      class="search"
      type="search"
      name="search-field"
      placeholder="Search products..."
      [value]="value()"
      (input)="onInput($event)"
    />
  </div>
</div>
