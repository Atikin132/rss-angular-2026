<div class="pagination">
  <div class="controls">
    <button mat-icon-button [disabled]="!hasPrevious() || loading()" (click)="previous()">
      <mat-icon>arrow_back_ios</mat-icon>
    </button>

    <span class="info">
      Page <strong>{{ currentPage() }}</strong> / {{ totalPages() }}
      <span class="total">({{ total() }} products)</span>
    </span>

    <button mat-icon-button [disabled]="!hasNext() || loading()" (click)="next()">
      <mat-icon>arrow_forward_ios</mat-icon>
    </button>
  </div>
</div>
