@let productItem = product();

<div class="card" [routerLink]="['product', productItem.slug]">
  <img class="poster" [src]="productItem.image" [alt]="productItem.name" />

  <div class="card-info">
    <div class="info">
      <h3 class="product-name">{{ productItem.name }}</h3>

      <div class="price-block">
        <span class="price">
          {{ actualPrice() | currency: productItem.currency }}
        </span>

        @if (hasDiscount()) {
          <span class="old-price">
            {{ productItem.price | currency: productItem.currency }}
          </span>
        }
      </div>
    </div>
    <app-cart-button [product]="productItem" />
  </div>
  <button
    mat-icon-button
    class="wishlist-btn"
    [class.active]="isFavorite()"
    (click)="toggleFavorite($event)"
  >
    <mat-icon>
      {{ isFavorite() ? 'favorite' : 'favorite_border' }}
    </mat-icon>
  </button>

  <button
    mat-icon-button
    class="compare-btn"
    [class.active]="isCompared()"
    (click)="toggleCompare($event)"
  >
    <mat-icon>balance</mat-icon>
  </button>
</div>
