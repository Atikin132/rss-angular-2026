<div
  class="overlay"
  tabindex="0"
  (click)="onOverlayClick($event)"
  (keydown)="onOverlayKeydown($event)"
>
  <div class="modal" role="dialog" aria-modal="true">
    <button mat-icon-button class="close" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>

    <button mat-icon-button class="prev" (click)="previous()">
      <mat-icon>arrow_back_ios</mat-icon>
    </button>

    <div class="content">
      <img class="image" [src]="currentImage()" alt="" />
      <div class="thumbnails">
        @for (image of images(); track image; let i = $index) {
          <button class="thumbnail" [class.active]="currentIndex() === i" (click)="selectImage(i)">
            <img [src]="image" alt="" />
          </button>
        }
      </div>
    </div>

    <button mat-icon-button class="next" (click)="next()">
      <mat-icon>arrow_forward_ios</mat-icon>
    </button>
  </div>
</div>
