@if (product(); as p) {
  <app-product-breadcrumbs [productName]="p.name" [slug]="p.slug" />
  <div class="page-content">
    <app-product-gallery class="gallery" [images]="p.images" />
    <div class="info-btns">
      <div class="info">
        <h2 class="product-name">{{ p.name }}</h2>
        <div class="price-block">
          <span class="price">
            {{ actualPrice() | currency: p.currency }}
          </span>

          @if (hasDiscount()) {
            <span class="old-price">
              {{ p.price | currency: p.currency }}
            </span>
          }
        </div>
        <p>{{ p.description }}</p>
      </div>
      <div class="btns">
        <button
          mat-flat-button
          class="add-to-cart-btn"
          [class.added]="cartButtonState().added"
          [class.remove]="cartButtonState().remove"
          (click)="toggleCart($event)"
          (mouseenter)="hovered.set(true)"
          (mouseleave)="hovered.set(false)"
        >
          <mat-icon>{{ cartButtonState().icon }}</mat-icon>

          {{ cartButtonState().text }}
        </button>
        <button
          mat-icon-button
          class="wishlist-btn"
          [class.active]="isFavorite()"
          (click)="toggleFavorite($event)"
        >
          <mat-icon>
            {{ isFavorite() ? 'favorite' : 'favorite_border' }}
          </mat-icon>
        </button>

        <button
          mat-icon-button
          class="compare-btn"
          [class.active]="isCompared()"
          (click)="toggleCompare($event)"
        >
          <mat-icon>balance</mat-icon>
        </button>
      </div>
    </div>
  </div>
} @else {
  <p class="nothing-found-text">Nothing found</p>
}
