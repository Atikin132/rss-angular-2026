<div class="gallery">
  <button class="main-image" (click)="openModal()">
    <img [src]="selectedImage()" alt="" />
  </button>

  <div class="thumbnails">
    @for (image of images(); track $index) {
      <button
        class="thumbnail"
        [class.active]="selectedImage() === image"
        (click)="selectImage(image)"
      >
        <img [src]="image" alt="" />
      </button>
    }
  </div>
</div>
