<mat-card class="cart-item">
  <img mat-card-image class="cart-item__image" [src]="item().imageUrl" [alt]="item().title" />

  <div class="cart-item__content">
    <div class="cart-item__info">
      <h3>{{ item().title }}</h3>

      <p class="cart-item__price">${{ item().price }}</p>
    </div>

    <div class="cart-item__actions">
      <div class="cart-item__quantity">
        <button mat-icon-button type="button" (click)="onDecrease()">
          <mat-icon>remove</mat-icon>
        </button>

        <span>{{ item().quantity }}</span>

        <button mat-icon-button type="button" (click)="onIncrease()">
          <mat-icon>add</mat-icon>
        </button>
      </div>

      <button mat-stroked-button type="button" (click)="onRemove()">
        <mat-icon>delete</mat-icon>
        Remove
      </button>
    </div>
  </div>
</mat-card>
