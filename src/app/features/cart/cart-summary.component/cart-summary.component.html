<div class="cart-summary">
  <h2>Order Summary</h2>

  <div class="cart-summary__row">
    <span>Subtotal</span>
    <strong>{{ subtotalPrice() | price }}</strong>
  </div>

  <div class="cart-summary__row">
    <span>Shipping</span>
    <strong class="cart-summary__accent">FREE</strong>
  </div>

  <div class="cart-summary__row cart-summary__row--total">
    <span>Total</span>
    <strong>{{ totalPrice() | price }}</strong>
  </div>

  <label class="cart-summary__promo">
    <span>Promo Code</span>
    <div class="cart-summary__promo-control">
      <input
        type="text"
        placeholder="Enter code"
        [value]="promoCode()"
        (input)="promoCode.set($any($event.target).value)"
      />
      <button type="button" (click)="onApplyPromoCode()">Apply</button>
    </div>
  </label>

  <button class="cart-summary__checkout" type="button">
    Proceed to Checkout
    <span aria-hidden="true">-></span>
  </button>

  <p class="cart-summary__note">Secure SSL Encryption & 30-Day Returns</p>
</div>
